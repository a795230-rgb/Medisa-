<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابزار ویدئو ساز هوش مصنوعی</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
        }

        .input-group {
            margin: 20px 0;
        }

        input[type="file"], input[type="text"] {
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin: 10px;
            width: 80%;
            font-size: 1em;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: #00ff88;
            color: #1e3c72;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ff88;
        }

        #preview {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 10px;
            display: none;
        }

        .animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: float 10s infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="animation" id="particles"></div>
    <div class="container">
        <h1>ویدئو ساز هوش مصنوعی</h1>
        <div class="input-group">
            <input type="file" id="videoInput" accept="video/*" />
            <input type="text" id="textInput" placeholder="متن برای ویدئو وارد کنید" />
            <button onclick="processVideo()">ساخت ویدئو</button>
        </div>
        <video id="preview" controls></video>
    </div>

    <script>
        // انیمیشن ذرات پس‌زمینه
        function createParticles() {
            const particlesDiv = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.width = `${Math.random() * 5 + 2}px`;
                particle.style.height = particle.style.width;
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.animationDelay = `${Math.random() * 10}s`;
                particlesDiv.appendChild(particle);
            }
        }

        // پردازش ویدئو (نمونه ساده)
        function processVideo() {
            const videoInput = document.getElementById('videoInput');
            const textInput = document.getElementById('textInput').value;
            const preview = document.getElementById('preview');

            if (videoInput.files.length > 0) {
                const file = videoInput.files[0];
                const url = URL.createObjectURL(file);
                preview.src = url;
                preview.style.display = 'block';
                alert(`ویدئو با متن "${textInput}" در حال پردازش است...`);
            } else {
                alert('لطفاً یک فایل ویدئویی انتخاب کنید.');
            }
        }

        // اجرای انیمیشن ذرات هنگام بارگذاری صفحه
        window.onload = createParticles;
    </script>
</body>
</html>
